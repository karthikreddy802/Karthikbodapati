<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Table - {{ restaurant.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-lg p-4">
        <h2 class="mb-4">🪑 Book a Table at {{ restaurant.name }}</h2>
        <p class="text-muted">Select date, time slot and number of guests.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="row g-3">
            {% csrf_token %}
            <div class="col-md-4">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required {% if today %}min="{{ today }}"{% endif %}>
            </div>
            <div class="col-md-4">
                <label class="form-label">Time Slot</label>
                <select name="slot" class="form-select" required>
                    <option value="">Select slot</option>
                    {% for value, label in slots %}
                        <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Number of Guests</label>
                <input type="number" name="guest_count" class="form-control" value="2" min="1" max="20">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Next: Choose Table</button>
                <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-outline-secondary">Back</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.querySelector('input[name="date"]').min = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
