<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed - {{ restaurant.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-lg p-5 text-center">
        <h2 class="text-success mb-3">✅ Table booked successfully!</h2>
        <p class="text-muted">Your reservation at <strong>{{ restaurant.name }}</strong> is confirmed.</p>
        <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-primary">Back to {{ restaurant.name }}</a>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Dashboard</a>
    </div>
</div>
</body>
</html>
