<!DOCTYPE html>
<html>

<head>

<title>Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body class="bg-light">


<div class="container py-5">

<h2 class="fw-bold">

📦 Orders — {{ restaurant.name }}

</h2>

<br>


{% if orders %}

<div class="card shadow">

<table class="table table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Customer</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for order in orders %}

<tr>

<td>#{{ order.id }}</td>

<td>

{{ order.customer.username }}

</td>

<td>

₹ {{ order.total_price }}

</td>

<td>

<span class="badge bg-success">

{{ order.status }}

</span>

</td>

<td>

{{ order.created_at }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% else %}

<div class="alert alert-info">

No Orders Yet 🙂

</div>

{% endif %}

</div>

</body>

</html>
