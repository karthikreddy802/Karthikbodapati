<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Owner Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card shadow-lg p-4 rounded-4 border-0" style="width: 480px;">

        <h3 class="text-center mb-3 fw-bold">Restaurant Owner Signup</h3>
        <p class="text-muted text-center mb-4">
            Create an owner account and submit your restaurant details to join the platform.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Restaurant Name</label>
                <input type="text" name="restaurant_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Restaurant Address</label>
                <input type="text" name="address" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Google Maps URL (optional)</label>
                <input type="url" name="map_url" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Owner Name</label>
                <input type="text" name="owner_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-warning fw-bold">
                    Create Owner Account
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
