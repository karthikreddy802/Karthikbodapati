{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h3 class="mb-3 text-center">List Your Restaurant</h3>
                <p class="text-muted text-center">
                    Submit your restaurant details. The Super Admin will review
                    and approve your request before it appears to customers.
                </p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Restaurant Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location / Address</label>
                        <input type="text" name="location" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Google Maps URL (optional)</label>
                        <input type="url" name="map_url" class="form-control">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">
                            Submit Request
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
