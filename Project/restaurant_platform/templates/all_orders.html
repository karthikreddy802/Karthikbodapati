{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <h2 class="mb-4">📦 All Orders</h2>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Restaurant</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>#{{ order.id }}</td>
                <td>{{ order.restaurant }}</td>
                <td>{{ order.customer }}</td>
                <td>₹ {{ order.total_amount }}</td>
                <td>{{ order.status }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No orders found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
