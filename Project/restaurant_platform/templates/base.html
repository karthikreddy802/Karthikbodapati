<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Restaurant Platform{% endblock %}</title>

    <!-- Bootstrap (optional but recommended) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand text-white" href="#">Restaurant Platform</a>

    <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="text-white me-3">{{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a>
        {% endif %}
    </div>
</nav>

{% block content %}
{% endblock %}

</body>
</html>
