<!DOCTYPE html>
{% extends "myapp/base.html" %}
{% block content_block %}
<div class="container">
    <h2 class="my-4">Exam List</h2>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Exam Title</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for exam in exams %}
            <tr>
                <td>{{ exam.title }}</td>
                <td>
                    <a href="{% url 'update_exam' exam.id %}" class="btn btn-warning">Edit</a>
                    <a href="{% url 'delete_exam' exam.id %}" class="btn btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{%endblock%}
