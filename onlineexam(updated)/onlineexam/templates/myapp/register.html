<!DOCTYPE html>
{% extends "myapp/base.html" %}
{% load static %}
{% block content_block %}

<style>
    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background:
            linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
            url("https://www.eklavvya.com/blog/wp-content/uploads/2024/01/Generative-AI-Oral-Viva-Exam-1024x562.webp")
            no-repeat center center/cover;
        font-family: "Segoe UI", sans-serif;
    }

    .register-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .register-card {
        width: 420px;
        padding: 35px 32px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(20px);
        box-shadow: 0 25px 55px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.25);
        color: #fff;
    }

    .form-control {
        height: 46px;
        border-radius: 10px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        color: #fff;
    }

    .form-control::placeholder {
        color: rgba(255,255,255,0.6);
    }

    .btn-register {
        background: linear-gradient(135deg, #4f80ff, #6fa3ff);
        border: none;
        height: 46px;
        border-radius: 12px;
        font-weight: 600;
        margin-top: 10px;
        color: #fff;
    }

    .error-msg {
        color: #ffb3b3;
        margin-top: 12px;
        text-align: center;
    }

    .footer-text {
        margin-top: 18px;
        text-align: center;
        font-size: 14px;
    }

    .footer-text a {
        color: #9fc1ff;
        text-decoration: none;
    }
</style>

<div class="register-wrapper">
    <div class="register-card">
        <h3 class="text-center">Create Account</h3>
        <p class="text-center">Register to attend exam</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="username" class="form-control"
                    placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control"
                    placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label>Choose Course</label>
                <select name="course" class="form-control" required>
                    <option value="" disabled selected>-- Select Course --</option>
                    <option value="Java">Java</option>
                    <option value="Python">Python</option>
                    <option value=".NET">.NET</option>
                    <option value="SQL">SQL</option>
                </select>
            </div>
            <button type="submit" class="btn btn-register w-100">
                Register
            </button>
            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}
        </form>
        <div class="footer-text">
            Already registered?
            <a href="{% url 'user_login' %}">Login here</a>
        </div>
    </div>
</div>

{% endblock %}
