<!DOCTYPE html>
{% extends "myapp/base.html" %}
{% load static %}
{% block content_block %}

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background:
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
            url("https://img.freepik.com/premium-photo/artificial-intelligence-cyborg-using-computer-and-typing-keyboard-technology-in-future-generative-ai_106651-6726.jpg?w=2000")
            no-repeat center center/cover;
        font-family: "Segoe UI", sans-serif;
    }

    .login-wrapper {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-card {
        width: 380px;
        padding: 35px 32px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
    }

    .form-control {
        height: 46px;
        border-radius: 10px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        color: #fff;
    }

    .btn-login {
        background: linear-gradient(135deg, #4f80ff, #6fa3ff);
        border: none;
        height: 46px;
        border-radius: 12px;
        font-weight: 600;
        margin-top: 10px;
        color: #fff;
    }

    .error-msg {
        color: #ffb3b3;
        margin-top: 12px;
        text-align: center;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2 class="text-center">user Login</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>
            </div>

            <button type="submit" class="btn btn-login w-100">
                Login
            </button>

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}
        </form>
    </div>
</div>

{% endblock %}
