<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Exam Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 20px;
        }

        .nav-link {
            font-weight: 500;
        }

        .dropdown-menu {
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- NAVBAR START -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand" href="/">
            <i class="fas fa-graduation-cap"></i> OnlineExam
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Items -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <!-- Home -->
                <li class="nav-item">
                    <a class="nav-link" href="/home/">
                        <i class="fas fa-home"></i> Home
                    </a>
                </li>

                <!-- Login Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                    href="#"
                    role="button"
                    data-bs-toggle="dropdown">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="/admin_login/">
                                <i class="fas fa-user-shield"></i> Admin Login
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="/user_login/">
                                <i class="fas fa-user"></i> Student Login
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- Register -->
                <li class="nav-item">
                    <a class="nav-link" href="/register/">
                        <i class="fas fa-user-plus"></i> Register
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about/">
                        <i class="fas fa-info-circle"></i> About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contact/">
                        <i class="fas fa-phone"></i> Contact
                    </a>
                </li>

                <!-- Logout (Optional - shows only when logged in) -->
                {% if request.session.logged_in %}
                <li class="nav-item">
                    <a class="nav-link text-warning" href="/logout/">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>
<!-- NAVBAR END -->


<!-- MAIN CONTENT -->
<div class="container mt-4">
    {% block content_block %}
    {% endblock %}
</div>


<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
