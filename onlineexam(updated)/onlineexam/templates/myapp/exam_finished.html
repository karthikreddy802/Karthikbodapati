<!DOCTYPE html>
<html>
<head>
    <title>Exam Result</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #4f80ff, #6a5acd, #00c6ff, #0072ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            width: 500px;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: white;
        }

        .progress-container {
            width: 170px;
            height: 170px;
            margin: 20px auto;
        }

        .progress-circle {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-inner {
            width: 130px;
            height: 130px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
        }

        .stats {
            margin-top: 15px;
            font-size: 16px;
            line-height: 26px;
        }

        .status-pass {
            color: #22c55e;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }

        .status-fail {
            color: #ef4444;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            margin: 12px;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: white;
            color: #4f80ff;
        }

        .btn-primary:hover {
            background: #4f80ff;
            color: white;
        }

        .btn-home {
            background: rgba(255,255,255,0.3);
            color: white;
        }

        .btn-home:hover {
            background: white;
            color: #4f80ff;
        }
    </style>
</head>

<body>

<div class="result-card">

    <h2>Exam Result</h2>

    <!-- Progress Circle -->
    <div class="progress-container">
        <div class="progress-circle"
            style="background: conic-gradient(
                {% if status == 'PASS' %}
                    #22c55e {{ percentage }}%,
                {% else %}
                    #ef4444 {{ percentage }}%,
                {% endif %}
                rgba(255,255,255,0.2) {{ percentage }}%
            );">

            <div class="progress-inner">
                {{ correct }} / {{ total }}
            </div>
        </div>
    </div>

    <!-- Percentage -->
    <div style="font-size:18px;margin-top:10px;">
        Percentage: {{ percentage }}%
    </div>

    <!-- Detailed Stats -->
    <div class="stats">
        Answered: {{ answered }} <br>
        Unanswered: {{ unanswered }} <br>
        Correct: {{ correct }} <br>
        Wrong: {{ wrong }}
    </div>

    <!-- Pass Fail -->
    {% if status == "PASS" %}
        <div class="status-pass"> Congratulations! You Passed</div>

        <form action="{% url 'generate_certificate' %}">
            <button class="btn btn-primary">Download Certificate</button>
        </form>

    {% else %}
        <div class="status-fail">Sorry! You Failed</div>
    {% endif %}

    <a href="{% url 'home' %}">
        <button class="btn btn-home">Go Home</button>
    </a>

</div>

</body>
</html>
